<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#1a1410"/>

  <!-- Book back page -->
  <rect x="290" y="116" width="78" height="276" rx="10" fill="#ede8db"/>

  <!-- Book body -->
  <rect x="96" y="116" width="200" height="276" rx="12" fill="#f5f0e8"/>
  <rect x="110" y="130" width="172" height="248" rx="8" fill="white"/>

  <!-- Text lines -->
  <rect x="130" y="162" width="132" height="12" rx="6" fill="#d5cfc2"/>
  <rect x="130" y="184" width="112" height="12" rx="6" fill="#d5cfc2"/>
  <rect x="130" y="206" width="124" height="12" rx="6" fill="#d5cfc2"/>
  <rect x="130" y="228" width="96"  height="12" rx="6" fill="#d5cfc2"/>
  <rect x="130" y="250" width="118" height="12" rx="6" fill="#d5cfc2"/>
  <rect x="130" y="272" width="80"  height="12" rx="6" fill="#d5cfc2"/>
  <rect x="130" y="294" width="108" height="12" rx="6" fill="#d5cfc2"/>
  <rect x="130" y="316" width="88"  height="12" rx="6" fill="#d5cfc2"/>

  <!-- Spine -->
  <rect x="296" y="116" width="18" height="276" rx="4" fill="#e2dbd0"/>

  <!-- Speaker body -->
  <rect x="316" y="210" width="22" height="60" rx="5" fill="#c0392b"/>
  <!-- Speaker cone -->
  <polygon points="338,210 360,186 360,326 338,270" fill="#c0392b"/>

  <!-- Sound wave 1 -->
  <path d="M368 228 Q394 256 368 284" stroke="#e67e22" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Sound wave 2 -->
  <path d="M382 210 Q418 256 382 302" stroke="#e67e22" stroke-width="8" fill="none" stroke-linecap="round" opacity=".7"/>
  <!-- Sound wave 3 -->
  <path d="M398 192 Q444 256 398 320" stroke="#e67e22" stroke-width="6" fill="none" stroke-linecap="round" opacity=".4"/>
</svg>
